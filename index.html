<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CROPS ON MARS - STS 2026</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0f1f47 0%, #1e3a8a 50%, #3b82f6 100%);
      font-family: 'Inter', sans-serif;
      color: #e0f2fe;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #start-menu {
      position: relative;
      width: 90%;
      max-width: 900px;
      text-align: center;
      padding: 60px 40px;
      background: rgba(15, 31, 71, 0.65);
      border-radius: 32px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(59, 130, 246, 0.3);
      animation: fadeIn 1.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #dome {
      position: absolute;
      inset: -150px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 30%, rgba(59,130,246,0.25) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }

    #title {
      font-family: 'Orbitron', sans-serif;
      font-size: 5.2rem;
      font-weight: 700;
      color: #60a5fa;
      text-shadow: 0 0 40px #3b82f6, 0 0 80px #1e40af;
      margin: 0 0 16px 0;
      letter-spacing: 6px;
    }

    #credit {
      font-size: 1.4rem;
      color: #93c5fd;
      opacity: 0.9;
      margin-bottom: 60px;
    }

    .menu-buttons {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .menu-btn {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem;
      font-weight: 500;
      padding: 20px 80px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.35s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      letter-spacing: 2px;
    }

    #play-btn {
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: white;
    }

    #make-btn {
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      color: white;
    }

    .menu-btn:hover {
      transform: translateY(-6px) scale(1.06);
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    /* Game content (hidden at first) */
    #game-content {
      display: none;
      width: 100%;
      height: 100%;
      padding: 30px;
      box-sizing: border-box;
    }

    /* You can paste your existing game UI styles here later */
  </style>
</head>
<body>

  <div id="start-menu">
    <div id="dome"></div>

    <h1 id="title">CROPS ON MARS</h1>
    <div id="credit">by Sean Wang</div>

    <div class="menu-buttons">
      <button id="play-btn" class="menu-btn">PLAY</button>
    </div>
  </div>

  <!-- Your game UI goes here (hidden until PLAY is clicked) -->
  <div id="game-content">
    <!-- Paste your existing stats, controls, plots, log, etc. here -->
    <h2 style="text-align:center; color:#60a5fa;">Game Loaded</h2>
    <p style="text-align:center;">(Your existing game content would appear here after clicking PLAY)</p>
  </div>

  <script>
    const startMenu = document.getElementById('start-menu');
    const gameContent = document.getElementById('game-content');

    document.getElementById('play-btn').addEventListener('click', () => {
      startMenu.style.transition = 'opacity 1.2s ease, transform 1.2s ease';
      startMenu.style.opacity = '0';
      startMenu.style.transform = 'scale(0.95)';
      setTimeout(() => {
        startMenu.style.display = 'none';
        gameContent.style.display = 'block';
        // If you have init function from your TS
        if (window.game && window.game.init) window.game.init();
      }, 1200);
    });
  </script>

</body>
</html>
