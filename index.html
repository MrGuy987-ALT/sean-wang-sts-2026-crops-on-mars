<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mars Farm Simulator - STS 2026</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0015; /* plain dark space/Mars tone, no image */
      color: #e8e0ff;
      margin: 0;
      padding: 20px;
    }
    h1 { 
      color: #ff8c00; 
      text-align: center; 
      text-shadow: 0 0 15px #ff4500; 
      margin-bottom: 20px;
    }
    #stats {
      background: rgba(30, 10, 50, 0.75);
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 1.15em;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    #controls { 
      text-align: center; 
      margin: 20px 0; 
    }
    button {
      background: #4b2e00;
      color: #fff;
      border: 1px solid #aa6600;
      padding: 10px 18px;
      margin: 8px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 1em;
    }
    button:hover { background: #663d00; }
    #plots {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 15px;
      margin: 25px 0;
    }
    .plot {
      background: rgba(80, 40, 0, 0.65);
      border: 2px solid #8b5a2b;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.1em;
      border-radius: 10px;
      transition: all 0.4s;
    }
    .plot.growing { 
      background: rgba(0, 100, 0, 0.5); 
      border-color: #2e8b57; 
    }
    .plot.ready { 
      background: rgba(139, 69, 19, 0.7); 
      border-color: #deb887; 
      animation: glow 3s infinite alternate; 
    }
    @keyframes glow { 
      from { box-shadow: 0 0 10px #ffd700; } 
      to { box-shadow: 0 0 25px #ff8c00; } 
    }
    #log {
      background: rgba(0,0,0,0.7);
      padding: 15px;
      border-radius: 10px;
      height: 160px;
      overflow-y: auto;
      font-size: 0.95em;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Mars Farm Outpost</h1>

  <div id="stats">
    <span>Day: <b id="day">1</b></span>
    <span>Money: $<b id="money">1200</b></span>
    <span>Food: <b id="food">0</b></span>
    <span>Water: <b id="water">300</b> L</span>
    <span>Power: <b id="power">100</b>/day</span>
    <span>Shield: <b id="shield">60</b>%</span>
    <span>Soil: <b id="soil">20</b>%</span>
  </div>

  <div id="controls">
    <button onclick="game.plant('Radish')">Plant Radish</button>
    <button onclick="game.plant('Lettuce')">Plant Lettuce</button>
    <button onclick="game.plant('Potato')">Plant Potato</button>
    <button onclick="game.sendRover()">Send Rover</button>
    <button onclick="game.repairShield()">Repair Shield ($500)</button>
    <button onclick="game.togglePause()">Pause / Resume</button>
  </div>

  <h3>Greenhouse Plots (6 starting)</h3>
  <div id="plots"></div>

  <div id="log">Loading TypeScript game... (using browser compiler)</div>

  <!-- All esbuild + game loading logic here -->
  <script type="module">
    import * as esbuild from 'https://unpkg.com/esbuild-wasm@0.23.0/esm/browser.js';

    const logEl = document.getElementById('log');

    function log(msg) {
      if (logEl) {
        logEl.innerHTML += '<br>' + msg;
        logEl.scrollTop = logEl.scrollHeight;
      }
      console.log(msg);
    }

    log("Starting esbuild initialization...");

    try {
      await esbuild.initialize({
        wasmURL: 'https://unpkg.com/esbuild-wasm@0.23.0/esbuild.wasm',
        worker: false
      });
      log("esbuild ready!");
    } catch (err) {
      log('<span style="color: red;">esbuild init failed: ' + err.message + '</span>');
      console.error(err);
      return;
    }

    log("Fetching src/main.ts...");

    let tsCode;
    try {
      const res = await fetch('./src/main.ts');
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
      tsCode = await res.text();
      log("TS code fetched (" + tsCode.length + " chars)");
    } catch (err) {
      log('<span style="color: red;">Failed to load src/main.ts: ' + err.message + '</span>');
      console.error(err);
      return;
    }

    log("Transpiling TypeScript...");

    let result;
    try {
      result = await esbuild.transform(tsCode, {
        loader: 'ts',
        target: 'es2020',
        format: 'esm'
      });
    } catch (err) {
      log('<span style="color: red;">Transform failed: ' + err.message + '</span>');
      console.error(err);
      return;
    }

    if (result.errors && result.errors.length > 0) {
      log('<span style="color: red;">Transpile errors:</span><br>' + result.errors.map(e => e.text).join('<br>'));
      console.error(result.errors);
      return;
    }

    if (!result.code) {
      log('<span style="color: red;">No code output from transpile</span>');
      return;
    }

    log("Transpile success! Executing game code...");

    try {
      const blob = new Blob([result.code], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      const module = await import(url);

      window.game = module.game || module.default || module;

      log("Game loaded! You can now click buttons.");

      if (window.game && typeof window.game.init === 'function') {
        window.game.init();
      }
    } catch (err) {
      log('<span style="color: red;">Execution failed: ' + err.message + '</span>');
      console.error(err);
    }
  </script>

</body>
</html>
