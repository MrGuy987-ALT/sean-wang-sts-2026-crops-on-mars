<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Survival Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #d9534f;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .status {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mars Survival Simulator</h1>
        <div class="status" id="status"></div>
        <button onclick="startSimulation()">Start Simulation</button>
    </div>

    <script>
        function startSimulation() {
            try {
                // Initialize simulation variables
                let cropsAlive = true;
                let forcefieldActive = true;
                let botsOperational = true;
                let waterQuality = 100; // percentage
                let soilQuality = 100; // percentage

                // Simulate conditions
                setInterval(() => {
                    if (!cropsAlive) throw new Error("Crops have died!");
                    if (!forcefieldActive) throw new Error("Forcefield is down!");
                    if (!botsOperational) throw new Error("Bots are malfunctioning!");

                    // Randomly simulate events
                    if (Math.random() < 0.1) {
                        cropsAlive = false; // 10% chance crops die
                    }
                    if (Math.random() < 0.05) {
                        forcefieldActive = false; // 5% chance forcefield fails
                    }
                    if (Math.random() < 0.1) {
                        botsOperational = false; // 10% chance bots fail
                    }
                    if (Math.random() < 0.2) {
                        waterQuality -= 10; // 20% chance water quality decreases
                    }
                    if (Math.random() < 0.2) {
                        soilQuality -= 10; // 20% chance soil quality decreases
                    }

                    // Update status
                    updateStatus(cropsAlive, forcefieldActive, botsOperational, waterQuality, soilQuality);
                }, 2000);
            } catch (error) {
                document.getElementById('status').innerHTML = `<strong>Error:</strong> ${error.message}`;
            }
        }

        function updateStatus(cropsAlive, forcefieldActive, botsOperational, waterQuality, soilQuality) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `
                <p>Crops Alive: ${cropsAlive ? 'Yes' : 'No'}</p>
                <p>Forcefield Active: ${forcefieldActive ? 'Yes' : 'No'}</p>
                <p>Bots Operational: ${botsOperational ? 'Yes' : 'No'}</p>
                <p>Water Quality: ${waterQuality}%</p>
                <p>Soil Quality: ${soilQuality}%</p>
            `;
        }
    </script>
</body>
</html>
